name: Hassfest

on:
  push:
    branches:
      - main
      - "fix/**"
      - "feat/**"
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

jobs:
  hassfest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Hassfest validation
        uses: home-assistant/actions/hassfest@master
