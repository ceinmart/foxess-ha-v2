name: Validate with HACS

on:
  push:
    branches:
      - main
      - "fix/**"
      - "feat/**"
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

jobs:
  hacs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: HACS validation
        uses: hacs/action@main
        with:
          category: integration
